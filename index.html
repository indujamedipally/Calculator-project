<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="Stylesheet" href="./calculator.css">
</head><div>
    <h1>calculator</h1>
</div>
<body align="center">
    <table align="center">
        <tr><td>
            <input id="res">
        </td></tr>
        <tr><td>
            <button id="9" onclick="append(9)">9</button>
            <button id="8" onclick="append(8)">8</button>
            <button id="7" onclick="append(7)">7</button>
            <button id="+" onclick="append('+')">+</button>
        </td></tr>
        <tr><td>
            <button id="6" onclick="append(6)">6</button>
            <button id="5" onclick="append(5)">5</button>
            <button id="4" onclick="append(4)">4</button>
            <button id="-" onclick="append('-')">-</button>
        </td></tr>
        <tr><td><button id="3" onclick="append(3)">3</button>
        <button id="2" onclick="append(2)">2</button>
    <button id="1" onclick="append(1)">1</button>
<button id="*" onclick="append('*')">*</button></td></tr>
    <tr><td><button id="0" onclick="append(0)">0</button>
    <button id="/" onclick="append('/')">/</button>
    <button id="%" onclick="append('%')">%</button>
    <button id="=" onclick="result()">=</button>
    </td></tr>
    <tr>
            <td colspan="4">
                <button class="clear" onclick="clearDisplay()">Clear</button>
            </td>
        </tr>
        </table>
    <script src="./calculator.js"></script>
</body>
</html>
